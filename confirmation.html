<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmation — Synnova TOCLOE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/contact.css" />
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="navbar-interieur">
      <a href="index.html" class="navbar-logo">Synnova<span>.</span></a>
      <ul class="navbar-liens">
        <li><a href="index.html" class="lien-nav">Accueil</a></li>
        <li><a href="apropos.html" class="lien-nav">À propos</a></li>
        <li><a href="univers.html" class="lien-nav">Univers</a></li>
        <li><a href="portfolio.html" class="lien-nav">Portfolio</a></li>
        <li><a href="contact.html" class="lien-nav actif">Contact</a></li>
      </ul>
      <div class="navbar-actions">
        <button class="bouton-theme" id="boutonTheme" aria-label="Thème">
          <i class="fa-solid fa-sun" id="iconeTheme"></i>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <div class="menu-mobile" id="menuMobile">
      <ul>
        <li><a href="index.html" class="lien-mobile">Accueil</a></li>
        <li><a href="apropos.html" class="lien-mobile">À propos</a></li>
        <li><a href="univers.html" class="lien-mobile">Univers</a></li>
        <li><a href="portfolio.html" class="lien-mobile">Portfolio</a></li>
        <li><a href="contact.html" class="lien-mobile">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main class="page-confirmation" id="confirmationPage">
    <div class="confirmation-carte reveal" id="confirmationContenu"></div>
  </main>

  <script src="js/script.js"></script>
  <script>
    (function() {
      const conteneur = document.getElementById('confirmationContenu');
      if (!conteneur) return;

      const urlParams = new URLSearchParams(window.location.search);
      const success = urlParams.get('success');

      let titre, message, iconeClass, iconeIcon;

      if (success === '1') {
        titre = 'Message envoyé !';
        message = 'Votre message a bien été reçu.<br />Synnova vous répondra dans les plus brefs délais.';
        iconeClass = 'succes';
        iconeIcon = 'fa-check';
        conteneur.innerHTML = `
          <div class="confirmation-icone ${iconeClass}"><i class="fa-solid ${iconeIcon}"></i></div>
          <h1 class="confirmation-titre">${titre}</h1>
          <p class="confirmation-texte">${message}</p>
          <div class="confirmation-boutons">
            <a href="index.html" class="bouton-principal-conf"><i class="fa-solid fa-house"></i> Retour à l'accueil</a>
            <a href="https://wa.me/229XXXXXXXX" target="_blank" class="bouton-whatsapp-conf"><i class="fa-brands fa-whatsapp"></i> Continuer sur WhatsApp</a>
          </div>
        `;
      } else if (success === '0') {
        titre = 'Une erreur est survenue';
        message = 'Votre message n\'a pas pu être envoyé.<br />Veuillez réessayer ou me contacter directement.';
        iconeClass = 'erreur';
        iconeIcon = 'fa-triangle-exclamation';
        conteneur.innerHTML = `
          <div class="confirmation-icone ${iconeClass}"><i class="fa-solid ${iconeIcon}"></i></div>
          <h1 class="confirmation-titre">${titre}</h1>
          <p class="confirmation-texte">${message}</p>
          <div class="confirmation-boutons">
            <a href="contact.html" class="bouton-principal-conf"><i class="fa-solid fa-arrow-left"></i> Retour au formulaire</a>
            <a href="https://wa.me/229XXXXXXXX" target="_blank" class="bouton-whatsapp-conf"><i class="fa-brands fa-whatsapp"></i> Me contacter sur WhatsApp</a>
          </div>
        `;
      } else {
        titre = 'Page de confirmation';
        message = 'Cette page s\'affiche après l\'envoi d\'un message.<br />Souhaitez-vous m\'envoyer un message ?';
        iconeClass = 'succes';
        iconeIcon = 'fa-envelope';
        conteneur.innerHTML = `
          <div class="confirmation-icone ${iconeClass}"><i class="fa-solid ${iconeIcon}"></i></div>
          <h1 class="confirmation-titre">${titre}</h1>
          <p class="confirmation-texte">${message}</p>
          <div class="confirmation-boutons">
            <a href="contact.html" class="bouton-principal-conf"><i class="fa-solid fa-paper-plane"></i> Accéder au formulaire</a>
            <a href="index.html" class="bouton-secondaire-conf"><i class="fa-solid fa-house"></i> Retour à l'accueil</a>
          </div>
        `;
      }
    })();
  </script>
</body>
</html>
